# Kookers Supabase project config.
#
# Copy this file to `config.toml` (or run `supabase init`) and adjust
# the values to match your Supabase project. The CLI reads it for
# `supabase db push`, `supabase functions deploy`, etc.
#
# See https://supabase.com/docs/guides/local-development

project_id = "kookers"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 15
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your Kookers code is {{ .Code }}"

[auth.external.phone]
enabled = true

[analytics]
enabled = false

# Edge function env vars — set the real values via the Supabase
# dashboard → Edge Functions → Secrets, NOT in this file (which is
# committed).
[functions.send-push-notification]
verify_jwt = false
